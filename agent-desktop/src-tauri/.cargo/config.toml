# ============================================================
# Cargo 编译加速配置
# ============================================================

# ---- Windows MSVC 目标 ----
[target.x86_64-pc-windows-msvc]
# 方案 A：lld-link（LLVM 链接器，比 MSVC link.exe 快 2-5x）
# 前置条件：winget install LLVM.LLVM
# 取消下面注释即可启用
# linker = "lld-link"
# rustflags = ["-C", "link-arg=/DEBUG:FASTLINK"]

# 方案 B：使用 MSVC 默认链接器 + 增量调试信息（无需额外安装）
# FASTLINK 仅生成调试信息的索引而非完整副本，大幅减少链接耗时
rustflags = ["-C", "link-arg=/DEBUG:FASTLINK"]

# ---- protoc (Protocol Buffers compiler) ----
# Required by lance-encoding / prost-build (RAG feature).
# Install one of:
#   winget install Google.Protobuf
#   scoop install protobuf
#   https://github.com/protocolbuffers/protobuf/releases
#
# If protoc is NOT in your PATH, uncomment the [env] section below
# and set PROTOC to your actual protoc.exe location.
# You can find it with: where protoc
#
# [env]
# PROTOC = "C:\\path\\to\\your\\protoc.exe"

# ---- sccache 编译缓存（可选，重复编译快 3-10x）----
# 安装：cargo install sccache --locked
# 取消下面注释即可启用：
[build]
# rustc-wrapper = "sccache"
# 并发编译数（根据 CPU 核心数调整，留 1-2 核给系统）
jobs = 8
