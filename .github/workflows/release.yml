name: Release

# ===== 触发条件 =====
# 推送 v* 标签时自动构建发布（如 v0.2.0）
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  # 也支持手动触发（在 GitHub Actions 页面点击 Run workflow）
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（不含 v 前缀，如 0.2.0）"
        required: false
        default: ""

# ===== 权限 =====
permissions:
  contents: write # 创建 Release 需要

# ===== 发布流水线 =====
jobs:
  build-and-release:
    name: Build & Release (Windows)
    runs-on: windows-latest

    steps:
      # ① 检出仓库
      - name: Checkout
        uses: actions/checkout@v4

      # ② 安装 Node.js（code-server v4.127.0 要求 Node 22）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: agent-desktop/package-lock.json

      # ③ 安装 Rust（MSVC 工具链）
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      # ④ 安装前端依赖
      - name: Install npm dependencies
        working-directory: agent-desktop
        run: npm ci

      # ⑤ Rust 依赖缓存
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            agent-desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('agent-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ⑥ 恢复 code-server 缓存（命中则跳过下载，节省 ~54MB 流量）
      - name: Restore code-server cache
        uses: actions/cache@v4
        with:
          path: agent-desktop/src-tauri/binaries/code-server
          key: code-server-${{ hashFiles('build.config.json') }}
          restore-keys: |
            code-server-

      # ⑦ 下载 code-server + 安装 Votek Companion 扩展（缓存命中时自动跳过）
      - name: Download code-server & install companion
        run: node scripts/download-code-server.mjs

      # ⑧ 构建 + 打包
      - name: Build & Bundle
        working-directory: agent-desktop
        run: npm run tauri build

      # ⑨ 读取包信息
      - name: Read package info
        id: pkg
        shell: pwsh
        working-directory: agent-desktop
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $version = $conf.version
          $product = $conf.productName
          $exe = "$product`_$version`_x64-setup.exe"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "product=$product" >> $env:GITHUB_OUTPUT
          echo "exe=$exe" >> $env:GITHUB_OUTPUT
          echo "path=src-tauri/target/release/bundle/nsis/$exe" >> $env:GITHUB_OUTPUT

      # ⑩ 创建 GitHub Release 并上传安装包
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.pkg.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## ${{ steps.pkg.outputs.product }} v${{ steps.pkg.outputs.version }}

            详见 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)。

            ### 安装方式

            下载下方的 `${{ steps.pkg.outputs.exe }}`，双击运行即可。

            > 需要 Windows 10 或更高版本。WebView2 运行时会自动安装（如系统中没有）。
          files: |
            agent-desktop/${{ steps.pkg.outputs.path }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ⑪ 输出摘要
      - name: Summary
        shell: pwsh
        run: |
          Write-Host "========================================"  -ForegroundColor Green
          Write-Host "  Release v${{ steps.pkg.outputs.version }} ready!" -ForegroundColor Green
          Write-Host "========================================"  -ForegroundColor Green
          Write-Host ""
          Write-Host "  Installer: ${{ steps.pkg.outputs.path }}"
          Write-Host ""
          Write-Host "  Next steps:"
          Write-Host "    1. Go to GitHub Releases page"
          Write-Host "    2. Review the draft release"
          Write-Host "    3. Click 'Publish release'"
          Write-Host "========================================"  -ForegroundColor Green
